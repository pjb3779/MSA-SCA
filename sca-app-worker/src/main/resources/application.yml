spring:
  config:
    import: "classpath:application-common.yml"
  datasource:
    url: jdbc:postgresql://localhost:5432/msasca
    username: msasca
    password: msasca
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: never
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.transaction: DEBUG
    org.springframework.boot.context.config: DEBUG
sca:
  worker:
    workspace:
      base-path: C:/Users/beom/Desktop/buaa-msasca/.workspace

  build:
    images:
      default-image: maven:3.9-eclipse-temurin-17
      rules:
        - build-tool: MAVEN
          jdk-version: "*"
          image: maven:3.9-eclipse-temurin-17
        - build-tool: GRADLE
          jdk-version: "*"
          image: gradle:8.7-jdk17

  tool:
    images:
      codeql: "msasca/codeql-java:1.0.0"
      mscan: "msasca-mscan:dev"
    codeql:
      # codeql database analyze --ram (MB). OOM 방지용. 비어 있으면 CodeQL 기본값(~734MB) 사용. 4096~8192 권장
      analyze-ram: 4096
    mscan:
      # Mscan Docker 컨테이너 메모리 제한 (16GB RAM 노트북에서 OOM 방지, 6g 권장)
      docker-memory: 8g
      # agent: 
    llm:
      # 지금 api-key는 5달러가 한도 원래는 시크릿.얌으로 해야하지만 개발중이니까 그냥 구현
      # TODO(ops): 운영에서는 Secret YAML/Secret Store로 교체할 것
      openai-api-key: "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"
      openai-base-url: "https://openrouter.ai/api/v1"
      openai-model: "deepseek/deepseek-r1"