spring.datasource.url=jdbc:h2:mem:scajpatest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS VARCHAR\\;
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 테스트에서는 엔티티 기반으로 스키마를 생성/삭제한다.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

